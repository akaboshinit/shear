name: shear
description: >-
  Find unused files, dependencies, and exports in Dart & Flutter projects.
  Knip for Dart.
version: 0.1.0
repository: https://github.com/akaboshinit/shear

environment:
  sdk: ">=3.0.0 <4.0.0"

executables:
  shear: shear

dependencies:
  analyzer: ^7.0.0
  args: ^2.5.0
  glob: ^2.1.0
  path: ^1.9.0
  pubspec_parse: ^1.3.0
  yaml: ^3.1.0
  yaml_edit: ^2.2.4

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
